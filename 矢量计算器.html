        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0, 229, 160, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -15%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 200, 212, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* 输入框 */
        .vec-input {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            width: 100%;
            transition: all 0.25s ease;
            outline: none;
        }

        .vec-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px rgba(0, 229, 160, 0.08);
        }

        .vec-input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        /* 标签 */
        .vec-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        /* 卡片 */
        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .glass-card:hover {
            border-color: rgba(0, 229, 160, 0.25);
            box-shadow: 0 4px 40px rgba(0, 229, 160, 0.06);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        /* 按钮 */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #060b18;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.3px;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 229, 160, 0.25);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-op {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            color: var(--fg);
            font-weight: 600;
            font-size: 13px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-op:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-op:active {
            transform: scale(0.97);
        }

        .btn-op.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* 维度切换 */
        .dim-toggle {
            display: flex;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .dim-toggle .slider-bg {
            position: absolute;
            top: 3px;
            bottom: 3px;
            width: calc(50% - 3px);
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .dim-toggle .slider-bg.right {
            transform: translateX(calc(100% + 3px));
        }

        .dim-toggle button {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            z-index: 1;
            transition: color 0.3s;
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
        }

        .dim-toggle button.inactive {
            color: var(--muted);
        }

        .dim-toggle button.active-dim {
            color: #060b18;
        }

        /* 结果展示 */
        .result-box {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            position: relative;
            transition: all 0.3s;
        }

        .result-box.show {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 229, 160, 0.08);
        }

        .result-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
        }

        /* Canvas 容器 */
        .canvas-wrap {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

        .canvas-wrap canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 32px 0;
        }

        /* 结果弹出动画 */
        @keyframes resultPop {
            0% {
                opacity: 0;
                transform: translateY(8px) scale(0.97);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .result-animate {
            animation: resultPop 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 矢量箭头颜色指示 */
        .vec-color-a {
            color: #00e5a0;
        }

        .vec-color-b {
            color: #ff8a5c;
        }

        .vec-color-r {
            color: #00c8d4;
        }

        .dot-a {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00e5a0;
            display: inline-block;
        }

        .dot-b {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff8a5c;
            display: inline-block;
        }

        .dot-r {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c8d4;
            display: inline-block;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 14px;
            color: var(--fg);
            animation: toastIn 0.35s ease forwards;
            max-width: 360px;
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        @keyframes toastIn {
            0% {
                opacity: 0;
                transform: translateX(40px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            0% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        /* 浮动粒子 */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        /* 章节标题 */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-title .icon-wrap {
            width: 36px;
            height: 36px;
            background: var(--accent-dim);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 16px;
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* 输入组标签 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        @media (max-width: 768px) {
            .glass-card {
                padding: 20px;
            }

            .result-val {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 浮动粒子由 JS 生成 -->

    <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 py-8">

        <!-- 顶部标题区 -->
        <header class="text-center mb-10">
            <div
                class="inline-flex items-center gap-3 mb-4 px-5 py-2 rounded-full border border-[var(--border)] bg-[var(--bg2)]">
                <i class="fa-solid fa-vector-square text-[var(--accent)] text-sm"></i>
                <span class="text-sm font-medium text-[var(--muted)] tracking-wide">VECTOR CALCULATOR</span>
            </div>
            <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-3">
                矢量计算器
            </h1>
            <p class="text-[var(--muted)] text-base max-w-xl mx-auto leading-relaxed">
                支持二维 / 三维矢量运算、合力分解为坐标轴分力、实时矢量可视化
            </p>

            <!-- 维度切换 -->
            <div class="flex justify-center mt-8">
                <div class="dim-toggle w-64">
                    <div class="slider-bg" id="dimSlider"></div>
                    <button id="btn2d" class="active-dim" onclick="setDimension('2d')">二维</button>
                    <button id="btn3d" class="inactive" onclick="setDimension('3d')">三维</button>
                </div>
            </div>
        </header>

        <!-- ====== 模块1：矢量分解 ====== -->
        <section class="glass-card mb-6" id="sec-decompose">
            <div class="section-title">
                <div class="icon-wrap"><i class="fa-solid fa-arrows-split-up-and-left"></i></div>
                <h2>矢量 (x, y) 分解计算</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 左：输入与结果 -->
                <div>
                    <div class="grid grid-cols-2 gap-4 mb-5">
                        <div class="input-group">
                            <label class="vec-label">X 分量</label>
                            <input type="number" class="vec-input" id="dec_x" value="3" step="0.1"
                                oninput="calcDecompose()">
                        </div>
                        <div class="input-group">
                            <label class="vec-label">Y 分量</label>
                            <input type="number" class="vec-input" id="dec_y" value="4" step="0.1"
                                oninput="calcDecompose()">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4" id="dec3dInputs" style="display:none;">
                        <div class="input-group">
                            <label class="vec-label">Z 分量</label>
                            <input type="number" class="vec-input" id="dec_z" value="0" step="0.1"
                                oninput="calcDecompose()">
                        </div>
                    </div>
                    <div class="result-box show mt-4" id="decResult">
                        <div class="text-xs text-[var(--muted)] mb-1 uppercase tracking-wide font-semibold">计算结果</div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <div class="text-xs text-[var(--muted)]">模长</div>
                                <div class="result-val" id="dec_mag">5.00</div>
                            </div>
                            <div>
                                <div class="text-xs text-[var(--muted)]" id="dec_angle_label">角度 (与X轴)</div>
                                <div class="result-val" id="dec_angle">53.13°</div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 右：Canvas 可视化 -->
                <div class="canvas-wrap" style="min-height:280px;">
                    <canvas id="decCanvas"></canvas>
                </div>
            </div>
        </section>

        <!-- ====== 模块2：合力分解 ====== -->
        <section class="glass-card mb-6" id="sec-force">
            <div class="section-title">
                <div class="icon-wrap"><i class="fa-solid fa-expand"></i></div>
                <h2>合力分解为坐标轴分力</h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="input-group">
                            <label class="vec-label">合力大小 (N)</label>
                            <input type="number" class="vec-input" id="force_F" value="10" step="0.1" min="0"
                                oninput="calcForce()">
                        </div>
                        <div class="input-group" id="forceAngle2dGroup">
                            <label class="vec-label">与X轴夹角 (°)</label>
                            <input type="number" class="vec-input" id="force_angle" value="30" step="1"
                                oninput="calcForce()">
                        </div>
                    </div>
                    <!-- 三维角度输入 -->
                    <div class="grid grid-cols-2 gap-4 mb-4" id="forceAngle3dGroup" style="display:none;">
                        <div class="input-group">
                            <label class="vec-label">极角 (与Z轴, °)</label>
                            <input type="number" class="vec-input" id="force_polar" value="45" step="1"
                                oninput="calcForce()">
                        </div>
                        <div class="input-group">
                            <label class="vec-label">方位角 (与X轴投影, °)</label>
                            <input type="number" class="vec-input" id="force_azimuth" value="30" step="1"
                                oninput="calcForce()">
                        </div>
                    </div>
                    <div class="result-box mt-2" id="forceResult">
                        <div class="text-xs text-[var(--muted)] mb-1 uppercase tracking-wide font-semibold">分力结果</div>
                        <div class="grid grid-cols-3 gap-3" id="forceResultGrid">
                            <div>
                                <div class="text-xs text-[var(--muted)]">Fx</div>
                                <div class="result-val" id="force_fx">8.66 N</div>
                            </div>
                            <div>
                                <div class="text-xs text-[var(--muted)]">Fy</div>
                                <div class="result-val" id="force_fy">5.00 N</div>
                            </div>
                            <div id="force_fz_wrap" style="display:none;">
                                <div class="text-xs text-[var(--muted)]">Fz</div>
                                <div class="result-val" id="force_fz">0.00 N</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="canvas-wrap" style="min-height:280px;">
                    <canvas id="forceCanvas"></canvas>
                </div>
            </div>
        </section>

        <div class="divider"></div>

        <!-- ====== 模块3：矢量运算 ====== -->
        <section class="glass-card mb-6" id="sec-operations">
            <div class="section-title">
                <div class="icon-wrap"><i class="fa-solid fa-bolt"></i></div>
                <h2>矢量运算</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 左：输入 -->
                <div>
                    <!-- 矢量 A -->
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="dot-a"></span>
                            <span class="text-sm font-bold tracking-wide">矢量 A</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="input-group">
                                <label class="vec-label">X</label>
                                <input type="number" class="vec-input" id="a_x" value="3" step="0.1"
                                    oninput="calcOps()">
                            </div>
                            <div class="input-group">
                                <label class="vec-label">Y</label>
                                <input type="number" class="vec-input" id="a_y" value="4" step="0.1"
                                    oninput="calcOps()">
                            </div>
                            <div class="input-group" id="a_z_group" style="display:none;">
                                <label class="vec-label">Z</label>
                                <input type="number" class="vec-input" id="a_z" value="0" step="0.1"
                                    oninput="calcOps()">
                            </div>
                        </div>
                    </div>
                    <!-- 矢量 B -->
                    <div class="mb-5">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="dot-b"></span>
                            <span class="text-sm font-bold tracking-wide">矢量 B</span>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="input-group">
                                <label class="vec-label">X</label>
                                <input type="number" class="vec-input" id="b_x" value="1" step="0.1"
                                    oninput="calcOps()">
                            </div>
                            <div class="input-group">
                                <label class="vec-label">Y</label>
                                <input type="number" class="vec-input" id="b_y" value="2" step="0.1"
                                    oninput="calcOps()">
                            </div>
                            <div class="input-group" id="b_z_group" style="display:none;">
                                <label class="vec-label">Z</label>
                                <input type="number" class="vec-input" id="b_z" value="5" step="0.1"
                                    oninput="calcOps()">
                            </div>
                        </div>
                    </div>

                    <!-- 运算按钮 -->
                    <div class="flex flex-wrap gap-2 mb-4" id="opButtons">
                        <button class="btn-op active" data-op="add" onclick="selectOp('add')">
                            <i class="fa-solid fa-plus mr-1"></i> A + B
                        </button>
                        <button class="btn-op" data-op="sub" onclick="selectOp('sub')">
                            <i class="fa-solid fa-minus mr-1"></i> A - B
                        </button>
                        <button class="btn-op" data-op="dot" onclick="selectOp('dot')">
                            <i class="fa-solid fa-circle-dot mr-1"></i> A · B
                        </button>
                        <button class="btn-op" data-op="cross" onclick="selectOp('cross')" id="btnCross"
                            style="display:none;">
                            <i class="fa-solid fa-xmark mr-1"></i> A × B
                        </button>
                        <button class="btn-op" data-op="magA" onclick="selectOp('magA')">
                            |A|
                        </button>
                        <button class="btn-op" data-op="magB" onclick="selectOp('magB')">
                            |B|
                        </button>
                        <button class="btn-op" data-op="angle" onclick="selectOp('angle')">
                            <i class="fa-solid fa-angle-right mr-1"></i> 夹角
                        </button>
                    </div>
                </div>

                <!-- 右：Canvas + 结果 -->
                <div>
                    <div class="canvas-wrap mb-4" style="min-height:260px;">
                        <canvas id="opCanvas"></canvas>
                    </div>
                    <div class="result-box" id="opResult">
                        <div class="text-xs text-[var(--muted)] mb-1 uppercase tracking-wide font-semibold"
                            id="opResultLabel">矢量和 A + B</div>
                        <div class="result-val" id="opResultVal">(4.00, 6.00)</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="text-center text-[var(--muted)] text-xs mt-12 mb-6 opacity-60">
            矢量计算器 — 所有计算在本地浏览器完成
        </footer>
    </div>

    <script>
        // ============ 全局状态 ============
        let currentDim = '2d'; // '2d' | '3d'
        let currentOp = 'add';

        // ============ 工具函数 ============
        function degToRad(d) { return d * Math.PI / 180; }
        function radToDeg(r) { return r * 180 / Math.PI; }

        function showToast(msg, isError = false) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast' + (isError ? ' error' : '');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => {
                t.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // ============ 维度切换 ============
        function setDimension(dim) {
            currentDim = dim;
            const slider = document.getElementById('dimSlider');
            const btn2d = document.getElementById('btn2d');
            const btn3d = document.getElementById('btn3d');

            if (dim === '2d') {
                slider.classList.remove('right');
                btn2d.className = 'active-dim';
                btn3d.className = 'inactive';
            } else {
                slider.classList.add('right');
                btn2d.className = 'inactive';
                btn3d.className = 'active-dim';
            }

            // 显示/隐藏三维输入
            document.getElementById('dec3dInputs').style.display = dim === '3d' ? '' : 'none';
            document.getElementById('forceAngle2dGroup').style.display = dim === '2d' ? '' : 'none';
            document.getElementById('forceAngle3dGroup').style.display = dim === '3d' ? '' : 'none';
            document.getElementById('force_fz_wrap').style.display = dim === '3d' ? '' : 'none';
            document.getElementById('a_z_group').style.display = dim === '3d' ? '' : 'none';
            document.getElementById('b_z_group').style.display = dim === '3d' ? '' : 'none';
            document.getElementById('btnCross').style.display = dim === '3d' ? '' : 'none';

            // 更新角度标签
            document.getElementById('dec_angle_label').textContent = dim === '2d' ? '角度 (与X轴)' : '角度 (与Z轴)';

            // 重新计算
            calcDecompose();
            calcForce();
            calcOps();
        }

        // ============ 模块1：矢量分解 ============
        function calcDecompose() {
            const x = parseFloat(document.getElementById('dec_x').value) || 0;
            const y = parseFloat(document.getElementById('dec_y').value) || 0;
            const z = currentDim === '3d' ? (parseFloat(document.getElementById('dec_z').value) || 0) : 0;

            let mag, angle;
            if (currentDim === '2d') {
                mag = Math.hypot(x, y);
                if (x === 0 && y === 0) {
                    angle = 0;
                } else {
                    angle = radToDeg(Math.atan2(y, x));
                    if (angle < 0) angle += 360;
                }
            } else {
                mag = Math.sqrt(x * x + y * y + z * z);
                // 极角（与Z轴）
                if (mag === 0) {
                    angle = 0;
                } else {
                    angle = radToDeg(Math.acos(Math.max(-1, Math.min(1, z / mag))));
                }
            }

            document.getElementById('dec_mag').textContent = mag.toFixed(2);
            document.getElementById('dec_angle').textContent = angle.toFixed(2) + '°';

            drawDecCanvas(x, y, z);
        }

        function drawDecCanvas(x, y, z) {
            const canvas = document.getElementById('decCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;

            // 清除
            ctx.clearRect(0, 0, W, H);

            // 坐标系原点
            const cx = W / 2, cy = H / 2;
            const maxComp = Math.max(Math.abs(x), Math.abs(y), currentDim === '3d' ? Math.abs(z) : 0, 1);
            const scale = Math.min(W, H) * 0.32 / maxComp;

            // 绘制网格
            ctx.strokeStyle = 'rgba(30,45,77,0.5)';
            ctx.lineWidth = 0.5;
            const gridStep = scale;
            for (let i = -10; i <= 10; i++) {
                ctx.beginPath();
                ctx.moveTo(cx + i * gridStep, 0);
                ctx.lineTo(cx + i * gridStep, H);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, cy + i * gridStep);
                ctx.lineTo(W, cy + i * gridStep);
                ctx.stroke();
            }

            // 坐标轴
            ctx.strokeStyle = 'rgba(107,122,150,0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();

            // 轴标签
            ctx.fillStyle = 'rgba(107,122,150,0.8)';
            ctx.font = '12px "JetBrains Mono"';
            ctx.textAlign = 'left';
            ctx.fillText('X', W - 20, cy - 8);
            ctx.fillText('Y', cx + 8, 16);

            // 矢量箭头
            drawArrow(ctx, cx, cy, cx + x * scale, cy - y * scale, '#00e5a0', 2.5);

            // 投影虚线
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(0,229,160,0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx + x * scale, cy - y * scale);
            ctx.lineTo(cx + x * scale, cy);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + x * scale, cy - y * scale);
            ctx.lineTo(cx, cy - y * scale);
            ctx.stroke();
            ctx.setLineDash([]);

            // 分量标注
            ctx.fillStyle = '#00e5a0';
            ctx.font = '12px "JetBrains Mono"';
            ctx.textAlign = 'center';
            ctx.fillText('x=' + x.toFixed(1), cx + x * scale / 2, cy + 16);
            ctx.save();
            ctx.translate(cx - 14, cy - y * scale / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('y=' + y.toFixed(1), 0, 0);
            ctx.restore();

            // 角度弧
            if (currentDim === '2d' && (x !== 0 || y !== 0)) {
                let angle = Math.atan2(y, x);
                let arcR = Math.min(30, scale * maxComp * 0.4);
                ctx.beginPath();
                ctx.arc(cx, cy, arcR, 0, -angle, angle > 0);
                ctx.strokeStyle = 'rgba(0,200,212,0.7)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // ============ 模块2：合力分解 ============
        function calcForce() {
            const F = parseFloat(document.getElementById('force_F').value) || 0;
            let Fx, Fy, Fz = 0;

            if (currentDim === '2d') {
                const angleDeg = parseFloat(document.getElementById('force_angle').value) || 0;
                const theta = degToRad(angleDeg);
                Fx = F * Math.cos(theta);
                Fy = F * Math.sin(theta);
            } else {
                const polarDeg = parseFloat(document.getElementById('force_polar').value) || 0;
                const azimDeg = parseFloat(document.getElementById('force_azimuth').value) || 0;
                const theta = degToRad(polarDeg);
                const phi = degToRad(azimDeg);
                Fx = F * Math.sin(theta) * Math.cos(phi);
                Fy = F * Math.sin(theta) * Math.sin(phi);
                Fz = F * Math.cos(theta);
            }

            document.getElementById('force_fx').textContent = Fx.toFixed(2) + ' N';
            document.getElementById('force_fy').textContent = Fy.toFixed(2) + ' N';
            document.getElementById('force_fz').textContent = Fz.toFixed(2) + ' N';

            const rb = document.getElementById('forceResult');
            rb.classList.add('show');
            setTimeout(() => rb.classList.remove('show'), 800);

            drawForceCanvas(Fx, Fy, Fz);
        }

        function drawForceCanvas(Fx, Fy, Fz) {
            const canvas = document.getElementById('forceCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;
            ctx.clearRect(0, 0, W, H);

            const cx = W / 2, cy = H / 2;
            const maxComp = Math.max(Math.abs(Fx), Math.abs(Fy), currentDim === '3d' ? Math.abs(Fz) : 0, 1);
            const scale = Math.min(W, H) * 0.3 / maxComp;

            // 网格
            ctx.strokeStyle = 'rgba(30,45,77,0.5)';
            ctx.lineWidth = 0.5;
            const gridStep = scale;
            for (let i = -10; i <= 10; i++) {
                ctx.beginPath(); ctx.moveTo(cx + i * gridStep, 0); ctx.lineTo(cx + i * gridStep, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, cy + i * gridStep); ctx.lineTo(W, cy + i * gridStep); ctx.stroke();
            }

            // 坐标轴
            ctx.strokeStyle = 'rgba(107,122,150,0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();

            ctx.fillStyle = 'rgba(107,122,150,0.8)';
            ctx.font = '12px "JetBrains Mono"';
            ctx.textAlign = 'left';
            ctx.fillText('X', W - 20, cy - 8);
            ctx.fillText('Y', cx + 8, 16);

            // 合力（主矢量）
            drawArrow(ctx, cx, cy, cx + Fx * scale, cy - Fy * scale, '#00c8d4', 2.5);

            // X 分力
            drawArrow(ctx, cx, cy, cx + Fx * scale, cy, '#00e5a0', 1.8);
            // Y 分力
            drawArrow(ctx, cx, cy, cx, cy - Fy * scale, '#ffc24a', 1.8);

            // 虚线构成平行四边形
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = 'rgba(0,229,160,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx + Fx * scale, cy);
            ctx.lineTo(cx + Fx * scale, cy - Fy * scale);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255,194,74,0.3)';
            ctx.beginPath();
            ctx.moveTo(cx, cy - Fy * scale);
            ctx.lineTo(cx + Fx * scale, cy - Fy * scale);
            ctx.stroke();
            ctx.setLineDash([]);

            // 标注
            ctx.font = '11px "JetBrains Mono"';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#00e5a0';
            ctx.fillText('Fx=' + Fx.toFixed(1), cx + Fx * scale / 2, cy + 16);
            ctx.fillStyle = '#ffc24a';
            ctx.fillText('Fy=' + Fy.toFixed(1), cx - 24, cy - Fy * scale / 2);
            ctx.fillStyle = '#00c8d4';
            const mx = cx + Fx * scale / 2 + 10;
            const my = cy - Fy * scale / 2 - 10;
            ctx.fillText('F', mx, my);
        }

        // ============ 模块3：矢量运算 ============
        function getVecA() {
            const x = parseFloat(document.getElementById('a_x').value) || 0;
            const y = parseFloat(document.getElementById('a_y').value) || 0;
            const z = currentDim === '3d' ? (parseFloat(document.getElementById('a_z').value) || 0) : 0;
            return currentDim === '2d' ? [x, y] : [x, y, z];
        }

        function getVecB() {
            const x = parseFloat(document.getElementById('b_x').value) || 0;
            const y = parseFloat(document.getElementById('b_y').value) || 0;
            const z = currentDim === '3d' ? (parseFloat(document.getElementById('b_z').value) || 0) : 0;
            return currentDim === '2d' ? [x, y] : [x, y, z];
        }

        function vecAdd(a, b) { return a.map((v, i) => v + b[i]); }
        function vecSub(a, b) { return a.map((v, i) => v - b[i]); }
        function vecDot(a, b) { return a.reduce((s, v, i) => s + v * b[i], 0); }
        function vecCross(a, b) {
            return [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ];
        }
        function vecMag(v) { return Math.sqrt(v.reduce((s, x) => s + x * x, 0)); }
        function vecAngle(a, b) {
            const m1 = vecMag(a), m2 = vecMag(b);
            if (m1 === 0 || m2 === 0) return null;
            let cosT = vecDot(a, b) / (m1 * m2);
            cosT = Math.max(-1, Math.min(1, cosT));
            return radToDeg(Math.acos(cosT));
        }

        function selectOp(op) {
            currentOp = op;
            document.querySelectorAll('#opButtons .btn-op').forEach(b => {
                b.classList.toggle('active', b.dataset.op === op);
            });
            calcOps();
        }

        function calcOps() {
            const a = getVecA(), b = getVecB();
            const rBox = document.getElementById('opResult');
            const rLabel = document.getElementById('opResultLabel');
            const rVal = document.getElementById('opResultVal');

            let label = '', val = '', drawVec = null, drawVecB = null;

            switch (currentOp) {
                case 'add': {
                    const r = vecAdd(a, b);
                    label = '矢量和 A + B';
                    val = `(${r.map(v => v.toFixed(2)).join(', ')})`;
                    drawVec = r; drawVecB = { a, b };
                    break;
                }
                case 'sub': {
                    const r = vecSub(a, b);
                    label = '矢量差 A - B';
                    val = `(${r.map(v => v.toFixed(2)).join(', ')})`;
                    drawVec = r; drawVecB = { a, b };
                    break;
                }
                case 'dot': {
                    const r = vecDot(a, b);
                    label = '点积 A · B';
                    val = r.toFixed(2);
                    drawVecB = { a, b };
                    break;
                }
                case 'cross': {
                    if (currentDim !== '3d') {
                        label = '叉积 A × B';
                        val = '仅三维支持';
                    } else {
                        const r = vecCross(a, b);
                        label = '叉积 A × B';
                        val = `(${r.map(v => v.toFixed(2)).join(', ')})`;
                        drawVec = r; drawVecB = { a, b };
                    }
                    break;
                }
                case 'magA': {
                    const r = vecMag(a);
                    label = '矢量A的模长 |A|';
                    val = r.toFixed(2);
                    drawVec = a;
                    break;
                }
                case 'magB': {
                    const r = vecMag(b);
                    label = '矢量B的模长 |B|';
                    val = r.toFixed(2);
                    drawVec = b;
                    break;
                }
                case 'angle': {
                    const r = vecAngle(a, b);
                    label = '两矢量夹角';
                    if (r === null) {
                        val = '无法计算（零矢量）';
                    } else {
                        val = r.toFixed(2) + '°';
                    }
                    drawVecB = { a, b };
                    break;
                }
            }

            rLabel.textContent = label;
            rVal.textContent = val;
            rBox.classList.add('show');
            setTimeout(() => rBox.classList.remove('show'), 600);

            drawOpCanvas(a, b, currentOp);
        }

        function drawOpCanvas(a, b, op) {
            const canvas = document.getElementById('opCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;
            ctx.clearRect(0, 0, W, H);

            const cx = W / 2, cy = H / 2;
            const allComps = [...a, ...b];
            const maxComp = Math.max(...allComps.map(Math.abs), 1);
            const scale = Math.min(W, H) * 0.28 / maxComp;

            // 网格
            ctx.strokeStyle = 'rgba(30,45,77,0.5)';
            ctx.lineWidth = 0.5;
            for (let i = -10; i <= 10; i++) {
                const gs = scale;
                ctx.beginPath(); ctx.moveTo(cx + i * gs, 0); ctx.lineTo(cx + i * gs, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, cy + i * gs); ctx.lineTo(W, cy + i * gs); ctx.stroke();
            }

            // 坐标轴
            ctx.strokeStyle = 'rgba(107,122,150,0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();

            // 矢量 A
            drawArrow(ctx, cx, cy, cx + a[0] * scale, cy - a[1] * scale, '#00e5a0', 2.5);
            // 矢量 B
            drawArrow(ctx, cx, cy, cx + b[0] * scale, cy - b[1] * scale, '#ff8a5c', 2.5);

            // 运算结果可视化
            if (op === 'add') {
                const r = vecAdd(a, b);
                // 平行四边形法则
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(0,200,212,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx + a[0] * scale, cy - a[1] * scale);
                ctx.lineTo(cx + r[0] * scale, cy - r[1] * scale);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx + b[0] * scale, cy - b[1] * scale);
                ctx.lineTo(cx + r[0] * scale, cy - r[1] * scale);
                ctx.stroke();
                ctx.setLineDash([]);
                drawArrow(ctx, cx, cy, cx + r[0] * scale, cy - r[1] * scale, '#00c8d4', 2.5);
            } else if (op === 'sub') {
                const r = vecSub(a, b);
                // 从 B 尾端到 A 尾端
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(0,200,212,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx + b[0] * scale, cy - b[1] * scale);
                ctx.lineTo(cx + r[0] * scale, cy - r[1] * scale);
                ctx.stroke();
                ctx.setLineDash([]);
                drawArrow(ctx, cx, cy, cx + r[0] * scale, cy - r[1] * scale, '#00c8d4', 2.5);
            } else if (op === 'angle') {
                const canvasAngA = -Math.atan2(a[1], a[0]);
                const canvasAngB = -Math.atan2(b[1], b[0]);

                // 从 B 方向到 A 方向画小弧
                let diff = canvasAngA - canvasAngB;
                while (diff > Math.PI) diff -= 2 * Math.PI;
                while (diff < -Math.PI) diff += 2 * Math.PI;

                ctx.beginPath();
                ctx.arc(cx, cy, 30, canvasAngB, canvasAngB + diff, diff < 0);
                ctx.strokeStyle = 'rgba(0,200,212,0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 标注
            ctx.font = '11px "JetBrains Mono"';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#00e5a0';
            ctx.fillText('A', cx + a[0] * scale + 6, cy - a[1] * scale - 6);
            ctx.fillStyle = '#ff8a5c';
            ctx.fillText('B', cx + b[0] * scale + 6, cy - b[1] * scale - 6);
        }

        // ============ 通用箭头绘制 ============
        function drawArrow(ctx, x1, y1, x2, y2, color, lineWidth) {
            const headLen = 10;
            const dx = x2 - x1, dy = y2 - y1;
            const angle = Math.atan2(dy, dx);

            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 线段
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // 箭头
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        // ============ 浮动粒子 ============
        function createParticles() {
            const colors = ['rgba(0,229,160,0.3)', 'rgba(0,200,212,0.2)', 'rgba(255,194,74,0.15)'];
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (12 + Math.random() * 20) + 's';
                p.style.animationDelay = (Math.random() * 15) + 's';
                document.body.appendChild(p);
            }
        }

        // ============ 窗口调整 ============
        function onResize() {
            calcDecompose();
            calcForce();
            calcOps();
        }

        // ============ 初始化 ============
        window.addEventListener('load', () => {
            createParticles();
            calcDecompose();
            calcForce();
            calcOps();
        });
        window.addEventListener('resize', onResize);

        // 输入框回车/变化也触发（已通过 oninput 处理）
    </script>
</body>
